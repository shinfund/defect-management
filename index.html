<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하자보수 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#378ADD; --sky50:#E6F1FB; --sky100:#B5D4F4; --sky600:#185FA5; --sky800:#0C447C;
  --teal:#1D9E75; --teal50:#E1F5EE; --teal100:#9FE1CB; --teal600:#0F6E56;
  --coral:#D85A30; --coral50:#FAECE7; --coral100:#F5C4B3; --coral800:#712B13;
  --amber:#BA7517; --amber50:#FAEEDA; --amber100:#FAC775; --amber800:#633806;
  --green:#639922; --green50:#EAF3DE; --green100:#C0DD97; --green800:#27500A;
  --purple:#534AB7; --purple50:#EEEDFE; --purple100:#CECBF6;
  --gray50:#F1EFE8; --gray100:#D3D1C7; --gray200:#B4B2A9; --gray600:#5F5E5A;
  --bg:#F5F8FF; --card:#FFFFFF; --border:#E0EAF5; --border2:#EBF3FF;
  --txt:#1A2535; --txt2:#3D4F68; --txt3:#6B7E99;
  --r6:6px; --r8:8px; --r12:12px; --r14:14px; --r16:16px; --r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
  --shadow-hover:0 6px 24px rgba(55,138,221,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;word-break:keep-all;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr-wrap{position:sticky;top:0;z-index:100}
.hdr{background:var(--sky800);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(12,68,124,.25)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:var(--r8);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:1px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.hdr-btns{display:flex;gap:7px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:18px;padding:5px 13px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:32px;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
.hdr-btn:disabled{opacity:.4;cursor:not-allowed}
.hdr-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}

/* ── TAB NAV ── */
.top-nav{background:var(--card);border-bottom:1.5px solid var(--border);display:flex;padding:0 6px;box-shadow:0 2px 8px rgba(55,138,221,.07)}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--txt2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:11px 4px;-webkit-tap-highlight-color:transparent;transition:color .15s;position:relative;white-space:nowrap}
.tab-btn.on{color:var(--sky600)}
.tab-btn.on::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2.5px;background:var(--sky);border-radius:2px 2px 0 0}
.tab-btn:hover:not(.on){color:var(--txt)}

/* ── KPI BAR ── */
.kpi-bar{display:flex;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border2);overflow-x:auto;scrollbar-width:none}
.kpi-bar::-webkit-scrollbar{display:none}
.kpi-card{flex:1;min-width:72px;background:var(--bg);border-radius:var(--r8);padding:8px 10px;text-align:center}
.kpi-num{font-size:20px;font-weight:900;line-height:1.1}
.kpi-lbl{font-size:10px;color:var(--txt3);margin-top:2px;font-weight:500}
.kpi-total .kpi-num{color:var(--sky800)}
.kpi-progress .kpi-num{color:var(--coral)}
.kpi-done .kpi-num{color:var(--teal600)}
.kpi-poor .kpi-num{color:var(--amber)}

/* ── MAIN WRAP ── */
.wrap{max-width:960px;margin:0 auto;padding:14px}
.panel{display:none}
.panel.on{display:block}

/* ── FILTER BAR ── */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.f-chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--txt2);transition:all .12s;white-space:nowrap;font-family:inherit}
.f-chip.on{background:var(--sky800);color:#fff;border-color:var(--sky800)}
.f-chip.c-teal.on{background:var(--teal600);border-color:var(--teal600)}
.f-chip.c-coral.on{background:var(--coral);border-color:var(--coral)}
.f-chip.c-amber.on{background:var(--amber);border-color:var(--amber)}
.search-box{flex:1;min-width:160px;padding:6px 10px;border-radius:var(--r8);border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--txt);background:var(--card);outline:none}
.search-box:focus{border-color:var(--sky100);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.filter-count{font-size:12px;color:var(--txt3);white-space:nowrap;padding:4px 0}

/* ── TABLE ── */
.tbl-wrap{background:var(--card);border-radius:var(--r12);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:680px}
thead tr{background:var(--bg);border-bottom:2px solid var(--border)}
th{padding:9px 12px;font-size:11px;font-weight:700;color:var(--txt2);text-align:left;white-space:nowrap}
td{padding:9px 12px;font-size:12px;color:var(--txt2);border-bottom:1px solid var(--border2);vertical-align:top;max-width:280px}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--sky50)}
tbody tr:last-child td{border-bottom:none}
.td-content{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;display:block}
.td-nowrap{white-space:nowrap}

/* ── STATUS BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-done{background:var(--teal50);color:var(--teal600)}
.badge-prog{background:var(--coral50);color:var(--coral)}
.badge-poor{background:var(--amber50);color:var(--amber)}

/* ── DASHBOARD ── */
.sc{background:var(--card);border-radius:var(--r12);border:1px solid var(--border);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.sc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sc-hd h3{font-size:13px;font-weight:700;color:var(--txt)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--txt2);min-width:64px;flex-shrink:0}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .4s ease}
.bar-val{font-size:12px;font-weight:700;color:var(--txt);min-width:28px;text-align:right;flex-shrink:0}
.bar-sub{font-size:10px;color:var(--txt3);min-width:36px;text-align:right;flex-shrink:0}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.status-card{padding:12px;border-radius:var(--r8);text-align:center}
.status-card .num{font-size:24px;font-weight:900;line-height:1}
.status-card .lbl{font-size:11px;margin-top:4px}
.status-done{background:var(--teal50);color:var(--teal600)}
.status-prog{background:var(--coral50);color:var(--coral)}
.status-poor{background:var(--amber50);color:var(--amber)}

/* ── MODAL ── */
#cfgModal{display:none}
#cfgModal.modal-open{display:block}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:18px}
.modal-box{background:var(--card);border-radius:var(--r20);padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:7px;color:var(--txt)}
.modal-field{margin-bottom:14px}
.modal-label{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r8);padding:10px 12px;font-size:15px;font-family:inherit;color:var(--txt);outline:none;transition:border .18s}
.modal-input:focus{border-color:var(--sky);background:#fff}
.modal-hint{font-size:12px;color:var(--txt3);margin-top:4px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-save{background:var(--sky);border:none;color:#fff;border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:40px}
.modal-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--txt2);border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px}

/* ── DETAIL MODAL ── */
#detailModal{display:none}
#detailModal.modal-open{display:block}
.detail-modal-box{max-width:560px;max-height:85vh;overflow-y:auto}
.detail-modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.detail-modal-hd h3{font-size:15px;font-weight:700;color:var(--txt)}
.detail-modal-close{width:28px;height:28px;border-radius:var(--r6);border:none;background:var(--bg);color:var(--txt2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:12px;font-weight:700;color:var(--txt3);min-width:80px;flex-shrink:0;padding-top:1px}
.detail-val{font-size:13px;color:var(--txt);line-height:1.6;flex:1}

/* ── 사진 영역 ── */
.photo-section{padding:10px 0;border-bottom:1px solid var(--border2)}
.photo-section:last-child{border-bottom:none}
.photo-label{font-size:12px;font-weight:700;color:var(--txt3);margin-bottom:6px}
.photo-wrap{position:relative;background:var(--bg);border-radius:var(--r8);overflow:hidden;border:1px solid var(--border)}
.photo-wrap a{display:block}
.photo-img{width:100%;max-height:280px;object-fit:contain;display:block;cursor:zoom-in;transition:opacity .25s}
.photo-img.loading{opacity:0}
.photo-img.loaded{opacity:1}
.photo-err{display:none;padding:20px;text-align:center;font-size:12px;color:var(--txt3);line-height:1.8}
.photo-err a{color:var(--sky600);font-weight:700;text-decoration:none}
.photo-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.photo-spinner::after{content:'';width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--sky600);border-radius:50%;animation:spin .7s linear infinite}

/* ── EMPTY / STATUS ── */
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty svg{width:40px;height:40px;stroke:var(--gray100);margin-bottom:10px}
.empty p{font-size:13px}
.load-hint{font-size:12px;color:var(--txt3);text-align:center;padding:10px 0 4px}
.last-update{font-size:11px;color:var(--txt3);text-align:right;padding:6px 14px 8px}
.err-msg{font-size:12px;color:var(--coral);text-align:center;padding:8px 14px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .hdr{padding:11px 12px}
  .hdr-title{font-size:15px}
  .wrap{padding:10px}
  .kpi-card{min-width:60px;padding:6px 8px}
  .kpi-num{font-size:18px}
  .dash-grid{grid-template-columns:1fr}
  .status-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:769px){
  .tab-btn{font-size:13px;padding:10px 16px}
  .wrap{padding:16px}
}
.last-update{font-size:11px;color:rgba(255,255,255,.75);text-align:right}
</style>
</head>
<body>

<!-- 설정 모달 -->
<div id="cfgModal">
  <div class="modal-backdrop" onclick="closeCfgModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0F9D58" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        Google Sheets 연동 설정
      </div>
      <div class="modal-field">
        <label class="modal-label">Google Sheets ID</label>
        <input id="cfgSheetId" class="modal-input" type="text" placeholder="https://docs.google.com/spreadsheets/d/..."/>
        <div class="modal-hint">스프레드시트 URL 전체 붙여넣기 OK · <strong>링크 공유(뷰어)</strong> 설정 필요</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">시트 이름 <span style="font-weight:400;color:var(--txt3)">(선택 — 비워두면 첫 번째 시트)</span></label>
        <input id="cfgSheetName" class="modal-input" type="text" placeholder="하자보수DB"/>
        <div class="modal-hint">탭 이름과 정확히 일치 (한글 OK)</div>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeCfgModal()">취소</button>
        <button class="modal-save" onclick="saveCfg()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div id="detailModal">
  <div class="modal-backdrop" onclick="closeDetail(event)">
    <div class="modal-box detail-modal-box" onclick="event.stopPropagation()">
      <div class="detail-modal-hd">
        <h3 id="detailTitle">하자 상세</h3>
        <button class="detail-modal-close" onclick="closeDetail()">✕</button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>
</div>

<!-- 헤더 -->
<div class="hdr-wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <div>
        <div class="hdr-title">하자보수 현황</div>
        <div class="hdr-sub" id="hdrSub">Google Sheets 연동</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="openCfgModal()">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          설정
        </button>
        <button class="hdr-btn" id="syncBtn" onclick="loadData()">
          <svg id="syncIcon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          <span id="syncLabel">새로고침</span>
        </button>
      </div>
      <div class="last-update" id="lastUpdate"></div>
    </div>
  </div>
  <!-- 탭 -->
  <div class="top-nav">
    <button class="tab-btn on" onclick="switchTab(0,this)">대시보드</button>
    <button class="tab-btn" onclick="switchTab(1,this)">목록</button>
    <button class="tab-btn" onclick="switchTab(2,this)">터널별</button>
    <button class="tab-btn" onclick="switchTab(3,this)">공종별</button>
  </div>
  <!-- KPI -->
  <div class="kpi-bar">
    <div class="kpi-card kpi-total"><div class="kpi-num" id="kpiTotal">-</div><div class="kpi-lbl">전체</div></div>
    <div class="kpi-card kpi-progress"><div class="kpi-num" id="kpiProg">-</div><div class="kpi-lbl">진행중</div></div>
    <div class="kpi-card kpi-done"><div class="kpi-num" id="kpiDone">-</div><div class="kpi-lbl">완료</div></div>
    <div class="kpi-card kpi-poor"><div class="kpi-num" id="kpiPoor">-</div><div class="kpi-lbl">미흡</div></div>
  </div>
  <div class="last-update" id="lastUpdate2" style="padding:6px 14px 8px;text-align:right;font-size:11px;color:var(--txt3);background:#fff"></div>
</div>

<div class="wrap">

<!-- 패널0: 대시보드 -->
<div class="panel on" id="p0">
  <div class="dash-grid">
    <div class="sc">
      <div class="sc-hd"><h3>처리 상태 현황</h3></div>
      <div class="status-grid">
        <div class="status-card status-done"><div class="num" id="ds-done">-</div><div class="lbl">완료</div></div>
        <div class="status-card status-prog"><div class="num" id="ds-prog">-</div><div class="lbl">진행중</div></div>
        <div class="status-card status-poor"><div class="num" id="ds-poor">-</div><div class="lbl">미흡</div></div>
      </div>
    </div>
    <div class="sc">
      <div class="sc-hd"><h3>완료율</h3></div>
      <div id="rateWrap" style="padding:4px 0"></div>
    </div>
  </div>
  <div class="sc">
    <div class="sc-hd"><h3>터널별 현황</h3></div>
    <div id="tunnelChart"></div>
  </div>
  <div class="sc">
    <div class="sc-hd"><h3>공종별 현황</h3></div>
    <div id="typeChart"></div>
  </div>
</div>

<!-- 패널1: 목록 -->
<div class="panel" id="p1">
  <div class="filter-row">
    <div class="filter-group" id="statusFilter">
      <button class="f-chip on" data-val="ALL" onclick="setFilter('status','ALL',this)">전체</button>
      <button class="f-chip c-coral" data-val="진행중" onclick="setFilter('status','진행중',this)">진행중</button>
      <button class="f-chip c-teal" data-val="완료" onclick="setFilter('status','완료',this)">완료</button>
      <button class="f-chip c-amber" data-val="미흡" onclick="setFilter('status','미흡',this)">미흡</button>
    </div>
    <input class="search-box" id="searchBox" placeholder="🔍 하자내용, 터널명, 위치 검색..." oninput="renderList()">
  </div>
  <div class="filter-row">
    <div class="filter-group" id="tunnelFilter"></div>
  </div>
  <div class="filter-count" id="filterCount"></div>
  <div class="tbl-wrap">
    <div class="tbl-scroll">
      <table>
        <thead><tr>
          <th>No.</th><th>날짜</th><th>터널</th><th>공종</th><th>위치</th><th>하자내용</th><th>상태</th><th>조치일</th><th>업체</th>
        </tr></thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>

  document.getElementById('lastUpdate2').textContent = demoTxt;

/* ── CONFIG MODAL ── */
function openCfgModal(){
  document.getElementById('cfgSheetId').value   = CFG.sheetId;
  document.getElementById('cfgSheetName').value = CFG.sheetName;
  document.getElementById('cfgModal').classList.add('modal-open');
}
function closeCfgModal(e){
  if(e && e.target !== document.querySelector('#cfgModal .modal-backdrop')) return;
  document.getElementById('cfgModal').classList.remove('modal-open');
}
function saveCfg(){
  var raw = document.getElementById('cfgSheetId').value.trim();
  var m = raw.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  var sid = m ? m[1] : raw;
  var sn  = document.getElementById('cfgSheetName').value.trim() || 'Sheet1';
  if(!sid){ alert('구글시트 ID를 입력해주세요.'); return; }
  CFG.sheetId   = sid;
  CFG.sheetName = sn;
  localStorage.setItem('haja_sheetId',   sid);
  localStorage.setItem('haja_sheetName', sn);
  document.getElementById('cfgModal').classList.remove('modal-open');
  loadData();
}

/* ── LOAD DATA ── */
function loadData(){
  if(!CFG.sheetId){ openCfgModal(); return; }
  setSync(true);
  var url = 'https://docs.google.com/spreadsheets/d/'+CFG.sheetId+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(CFG.sheetName);
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(txt){
      var json = JSON.parse(txt.replace(/^[^(]+\(|\);?\s*$/g,''));
      ALL_DATA = parseGviz(json);
      buildTunnelFilter();
      updateKPI();
      renderAll();
      setSync(false);
      var now = new Date();
      var upTxt = '최종 업데이트: '+fmt(now.getMonth()+1)+'/'+fmt(now.getDate())+' '+fmt(now.getHours())+':'+fmt(now.getMinutes());
      document.getElementById('lastUpdate').textContent = upTxt;
      document.getElementById('lastUpdate2').textContent = upTxt;
      updateHdrSub('총 '+ALL_DATA.length+'건 · 구글시트 연동');
    })
    .catch(function(e){
      setSync(false);
      var errMsg = '로드 실패 — 시트 공유 설정(링크가 있는 모든 사용자)을 확인하세요';
      document.getElementById('lastUpdate').textContent = errMsg;
      document.getElementById('lastUpdate2').textContent = errMsg;
      document.getElementById('lastUpdate').style.color = 'var(--coral)';
      document.getElementById('lastUpdate2').style.color = 'var(--coral)';
      updateHdrSub('로드 실패');
      console.error(e);
    });
}

function parseGviz(json){
  var cols = json.table.cols.map(function(c){ return c.label; });
  return (json.table.rows||[]).map(function(r,i){
    var obj = { _idx: i+1 };
    cols.forEach(function(lbl,ci){
      var cell = r.c && r.c[ci];
      var val = '';
      if(cell){
        if(cell.f) val = cell.f;
        else if(cell.v !== null && cell.v !== undefined) val = String(cell.v);
      }
      obj[lbl] = val.trim();
    });
    return obj;
  }).filter(function(r){ return r['하자내용'] && r['하자내용'].length > 0; });
}

function fmt(n){ return n<10?'0'+n:String(n); }

/* ── FILTER ── */
function setFilter(key, val, el){
  FILTER[key] = val;
  var grpId = key==='status'?'statusFilter':'tunnelFilter';
  var btns = document.getElementById(grpId).querySelectorAll('.f-chip');
  btns.forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  renderList();
}

function filtered(){
  var q = (document.getElementById('searchBox').value||'').trim().toLowerCase();
  return ALL_DATA.filter(function(r){
    var stMatch = FILTER.status==='ALL' || r['조치여부']===FILTER.status;
    var tnMatch = FILTER.tunnel==='ALL' || r['터널명']===FILTER.tunnel;
    var qMatch  = !q || (r['하자내용']||'').toLowerCase().includes(q)
                     || (r['터널명']||'').toLowerCase().includes(q)
                     || (r['위치']||'').toLowerCase().includes(q)
                     || (r['공종']||'').toLowerCase().includes(q);
    return stMatch && tnMatch && qMatch;
  });
}

/* ── BUILD TUNNEL FILTER CHIPS ── */
function buildTunnelFilter(){
  var tunnels = [];
  ALL_DATA.forEach(function(r){ if(r['터널명'] && !tunnels.includes(r['터널명'])) tunnels.push(r['터널명']); });
  tunnels.sort();
  var el = document.getElementById('tunnelFilter');
  el.innerHTML = '<button class="f-chip on" data-val="ALL" onclick="setFilter(\'tunnel\',\'ALL\',this)">전체</button>';
  tunnels.forEach(function(t){
    var b = document.createElement('button');
    b.className='f-chip'; b.dataset.val=t;
    b.textContent=t;
    b.onclick = function(){ setFilter('tunnel',t,this); };
    el.appendChild(b);
  });
}

/* ── KPI ── */
function updateKPI(){
  var d=ALL_DATA, done=0, prog=0, poor=0;
  d.forEach(function(r){
    var s=r['조치여부'];
    if(s==='완료') done++;
    else if(s==='진행중') prog++;
    else if(s==='미흡') poor++;
  });
  document.getElementById('kpiTotal').textContent = d.length;
  document.getElementById('kpiProg').textContent  = prog;
  document.getElementById('kpiDone').textContent  = done;
  document.getElementById('kpiPoor').textContent  = poor;
  document.getElementById('ds-done').textContent  = done;
  document.getElementById('ds-prog').textContent  = prog;
  document.getElementById('ds-poor').textContent  = poor;
  var rate = d.length>0?Math.round(done/d.length*100):0;
  document.getElementById('rateWrap').innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    +'<span style="font-size:32px;font-weight:900;color:var(--teal600)">'+rate+'%</span>'
    +'<span style="font-size:12px;color:var(--txt3)">하자 완료율</span></div>'
    +'<div class="bar-track" style="height:12px">'
    +'<div class="bar-fill" style="width:'+rate+'%;background:var(--teal600)"></div></div>';
}

/* ── RENDER ALL ── */
function renderAll(){
  renderList();
  renderDashboard();
  renderTunnelPanel();
  renderTypePanel();
}

/* ── LIST ── */
function renderList(){
  var rows = filtered();
  document.getElementById('filterCount').textContent = '총 '+rows.length+'건';
  var tbody = document.getElementById('listBody');
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--txt3)">검색 결과가 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(r,i){
    var s = r['조치여부'];
    var badge = s==='완료'?'badge-done':s==='진행중'?'badge-prog':'badge-poor';
    var slbl  = s==='완료'?'완료':s==='진행중'?'진행중':s||'-';
    return '<tr onclick="openDetail('+r._idx+')">'
      +'<td class="td-nowrap" style="color:var(--txt3)">'+r._idx+'</td>'
      +'<td class="td-nowrap">'+shortDate(r['날짜'])+'</td>'
      +'<td class="td-nowrap"><strong>'+esc(r['터널명'])+'</strong></td>'
      +'<td class="td-nowrap">'+esc(r['공종'])+'</td>'
      +'<td class="td-nowrap">'+esc(r['위치'])+'</td>'
      +'<td><span class="td-content">'+esc(r['하자내용'])+'</span></td>'
      +'<td><span class="badge '+badge+'">'+slbl+'</span></td>'
      +'<td class="td-nowrap">'+shortDate(r['조치일'])+'</td>'
      +'<td class="td-nowrap">'+esc(r['업체명'])+'</td>'
      +'</tr>';
  }).join('');
}

function shortDate(d){
  if(!d) return '-';
  var m = d.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(m) return m[2]+'/'+m[3];
  return d.substring(0,5)||d;
}

/* ── DASHBOARD CHARTS ── */
function renderDashboard(){
  var tunnels = groupBy(ALL_DATA,'터널명');
  var types   = groupBy(ALL_DATA,'공종');
  var tc = document.getElementById('tunnelChart');
  var tmax = Math.max.apply(null, Object.values(tunnels).map(function(a){return a.length;}));
  tc.innerHTML = Object.keys(tunnels).sort().map(function(t){
    var rows = tunnels[t];
    var done = rows.filter(function(r){return r['조치여부']==='완료';}).length;
    var prog = rows.filter(function(r){return r['조치여부']==='진행중';}).length;
    var poor = rows.filter(function(r){return r['조치여부']==='미흡';}).length;
    var pct  = Math.round(rows.length/tmax*100);
    var rate = Math.round(done/rows.length*100);
    return '<div class="bar-row">'
      +'<div class="bar-label">'+esc(t)+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--sky600)"></div></div>'
      +'<div class="bar-val">'+rows.length+'</div>'
      +'<div class="bar-sub" style="color:var(--teal600)">'+rate+'%</div>'
      +'</div>';
  }).join('');

  var ec = document.getElementById('typeChart');
  var emax = Math.max.apply(null, Object.values(types).map(function(a){return a.length;}));

  ec.innerHTML = Object.keys(types).sort(function(a,b){return types[b].length-types[a].length;}).map(function(t){
    var rows = types[t];

      +'<div class="bar-label">'+esc(t)+'</div>'

      +'<div class="bar-val">'+rows.length+'</div></div>';
  }).join('');
}

/* ── PHOTO URL 변환 ── */
// Apps Script 이미지 프록시 (구글 드라이브 → GitHub Pages 사진 표시용)
var PHOTO_PROXY = 'https://script.google.com/macros/s/AKfycbxW68Wd6kmUx-K482Dyc4cEr8LAwL4vdx38zhEe3HL1lujehjr3dJKJuggckGKpQAYrcg/exec';

function extractDriveId(url){
  if(!url) return '';
  url = url.trim();
  var m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m1) return m1[1];
  var m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return m2[1];
  return '';
}

// 프록시 fetch → base64 data URL → img 주입
function loadProxyPhoto(uid, proxyUrl, viewUrl, label){
  var wrap = document.getElementById(uid);
  if(!wrap) return;

  fetch(proxyUrl, {redirect: 'follow', mode: 'cors'})
    .then(function(r){ return r.text(); })
    .then(function(d){
      var sp = wrap.querySelector('.photo-spinner'); if(sp) sp.remove();
      if(!d || d.indexOf('data:') !== 0){
        var er = wrap.querySelector('.photo-err'); if(er) er.style.display='block'; return;
      }
      var a = document.createElement('a'); a.href=viewUrl; a.target='_blank'; a.rel='noopener';
      var img = document.createElement('img'); img.className='photo-img loaded';
      img.src = d; img.alt = label;
      a.appendChild(img); wrap.insertBefore(a, wrap.firstChild);
    })
    .catch(function(err){
      console.error('photo load error:', err);
      var sp = wrap.querySelector('.photo-spinner'); if(sp) sp.remove();
      var er = wrap.querySelector('.photo-err'); if(er) er.style.display='block';
    });
}

function makePhotoHtml(label, rawUrl){
  if(!rawUrl || !rawUrl.trim()) return '';
  var origUrl = rawUrl.trim();
  var driveId = extractDriveId(origUrl);

  var inner = '';
  if(driveId){
    var proxyUrl = PHOTO_PROXY + '?id=' + driveId;
    var viewUrl  = 'https://drive.google.com/file/d/'+driveId+'/view';
    var uid = 'pi'+Math.random().toString(36).slice(2,10);
    // placeholder 생성 후 setTimeout으로 fetch 실행 (DOM 삽입 후)
    inner = '<div class="photo-wrap" id="'+uid+'">'
      +'<div class="photo-spinner"></div>'
      +'<div class="photo-err" style="display:none">미리보기 불가<br><a href="'+esc(viewUrl)+'" target="_blank">🔗 Drive에서 직접 열기</a></div>'
      +'</div>';
    // DOM 삽입 후 실행되도록 큐에 등록
    setTimeout(function(){ loadProxyPhoto(uid, proxyUrl, viewUrl, label); }, 50);
  } else {
    inner = '<div class="photo-wrap">'
      +'<a href="'+esc(origUrl)+'" target="_blank" rel="noopener">'
      +'<img class="photo-img loading" src="'+esc(origUrl)+'" alt="'+label+'"'
      +' onload="this.classList.remove(\'loading\');this.classList.add(\'loaded\');var s=this.parentNode.parentNode.querySelector(\'.photo-spinner\');if(s)s.remove()"'
      +' onerror="this.style.display=\'none\';var e=this.parentNode.parentNode.querySelector(\'.photo-err\');if(e)e.style.display=\'block\';var s=this.parentNode.parentNode.querySelector(\'.photo-spinner\');if(s)s.remove()"'
      +'></a>'
      +'<div class="photo-spinner"></div>'
      +'<div class="photo-err">이미지를 불러올 수 없습니다<br><a href="'+esc(origUrl)+'" target="_blank">링크로 직접 열기 →</a></div>'
      +'</div>';
  }
  return '<div class="photo-section">'
    +'<div class="photo-label">'+label+'</div>'
    +inner
    +'</div>';
}

/* ── DETAIL MODAL ── */
function openDetail(idx){
  var r = ALL_DATA.find(function(d){ return d._idx===idx; });
  if(!r) return;
  var s = r['조치여부'];
  var badge = s==='완료'?'badge-done':s==='진행중'?'badge-prog':'badge-poor';
  document.getElementById('detailTitle').innerHTML = esc(r['터널명'])+' · '+esc(r['공종']);
  var rows = [
    ['날짜', r['날짜']],
    ['터널명', r['터널명']],
    ['공종', r['공종']],
    ['위치', r['위치']],
    ['하자내용', r['하자내용']],
    ['조치여부', '<span class="badge '+badge+'">'+esc(s||'-')+'</span>'],
    ['조치일', r['조치일']||'-'],
    ['업체명', r['업체명']||'-'],
    ['담당자', r['업체담당자']||'-'],
    ['전화번호', r['전화번호']||'-'],
    ['비고', r['비고']||'-'],
    ['출처', r['출처']||'-'],
  ];
  var infoHtml = rows.map(function(rv){
    return '<div class="detail-row"><div class="detail-key">'+rv[0]+'</div><div class="detail-val">'+rv[1]+'</div></div>';
  }).join('');

  var photoHtml = '';
  var p1 = r['하자사진_URL']||r['하자사진']||'';
  var p2 = r['조치사진_URL']||r['조치사진']||'';
  if(p1) photoHtml += makePhotoHtml('하자사진', p1);
  if(p2) photoHtml += makePhotoHtml('조치사진', p2);

  document.getElementById('detailBody').innerHTML = infoHtml + photoHtml;
  document.getElementById('detailModal').classList.add('modal-open');
}
function closeDetail(e){
  if(e && e.target !== document.querySelector('#detailModal .modal-backdrop')) return;
  document.getElementById('detailModal').classList.remove('modal-open');
}

/* ── TAB ── */
function switchTab(n,el){
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('p'+n).classList.add('on');
  el.classList.add('on');
}

function showModal(id){
  var m = document.getElementById(id);
  m.style.cssText='display:flex;position:fixed;inset:0;background:rgba(26,37,53,.5);z-index:2000;align-items:center;justify-content:center;padding:16px';

}
function hideModal(id){
  document.getElementById(id).style.cssText='display:none';
  document.body.style.overflow='';
}

/* ── SYNC BUTTON ── */
function setSync(loading){
  var btn  = document.getElementById('syncBtn');
  var icon = document.getElementById('syncIcon');
  var lbl  = document.getElementById('syncLabel');
  if(loading){
    btn.disabled = true;
    if(icon) icon.classList.add('spinning');
    lbl.textContent = '로딩중...';
  } else {
    btn.disabled = false;
    if(icon) icon.classList.remove('spinning');
    lbl.textContent = '새로고침';
  }
}

/* ── HELPERS ── */
function updateHdrSub(txt){ document.getElementById('hdrSub').textContent=txt; }
function groupBy(arr, key){
  var obj={};
  arr.forEach(function(r){ var k=r[key]||'(미지정)'; if(!obj[k]) obj[k]=[]; obj[k].push(r); });
  return obj;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
