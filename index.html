<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하자보수현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#378ADD; --sky50:#E6F1FB; --sky100:#B5D4F4; --sky600:#185FA5; --sky800:#0C447C;
  --teal:#1D9E75; --teal50:#E1F5EE; --teal100:#9FE1CB; --teal600:#0F6E56;
  --coral:#D85A30; --coral50:#FAECE7; --coral100:#F5C4B3; --coral800:#712B13;
  --amber:#BA7517; --amber50:#FAEEDA; --amber100:#FAC775; --amber800:#633806;
  --green:#639922; --green50:#EAF3DE; --green100:#C0DD97; --green800:#27500A;
  --purple:#534AB7; --purple50:#EEEDFE; --purple100:#CECBF6;
  --gray50:#F1EFE8; --gray100:#D3D1C7; --gray200:#B4B2A9; --gray600:#5F5E5A;
  --bg:#F5F8FF; --card:#FFFFFF; --border:#E0EAF5; --border2:#EBF3FF;
  --txt:#1A2535; --txt2:#3D4F68; --txt3:#6B7E99;
  --r6:6px; --r8:8px; --r12:12px; --r14:14px; --r16:16px; --r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;word-break:keep-all;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr-wrap{position:sticky;top:0;z-index:100}
.hdr{background:var(--sky800);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(12,68,124,.25)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:var(--r8);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:1px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.hdr-btns{display:flex;gap:7px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:18px;padding:5px 13px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:32px;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
.hdr-btn:disabled{opacity:.4;cursor:not-allowed}
.hdr-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}

/* ── TAB NAV ── */
.top-nav{background:var(--card);border-bottom:1.5px solid var(--border);display:flex;padding:0 6px;box-shadow:0 2px 8px rgba(55,138,221,.07)}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--txt2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;padding:11px 4px;-webkit-tap-highlight-color:transparent;transition:color .15s;position:relative;white-space:nowrap}
.tab-btn.on{color:var(--sky600)}
.tab-btn.on::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2.5px;background:var(--sky);border-radius:2px 2px 0 0}
.tab-btn:hover:not(.on){color:var(--txt)}

/* ── KPI BAR ── */
.kpi-bar{display:flex;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--border2);overflow-x:auto;scrollbar-width:none}
.kpi-bar::-webkit-scrollbar{display:none}
.kpi-card{flex:1;min-width:72px;background:var(--bg);border-radius:var(--r8);padding:8px 10px;text-align:center}
.kpi-num{font-size:20px;font-weight:900;line-height:1.1}
.kpi-lbl{font-size:12px;color:var(--txt2);margin-top:2px;font-weight:600}
.kpi-total .kpi-num{color:var(--sky800)}
.kpi-progress .kpi-num{color:var(--coral)}
.kpi-done .kpi-num{color:var(--teal600)}
.kpi-poor .kpi-num{color:var(--amber)}

/* ── MAIN WRAP ── */
.wrap{max-width:1280px;margin:0 auto;padding:14px}
.panel{display:none}
.panel.on{display:block}

/* ── FILTER BAR ── */
.filter-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;align-items:center}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.f-chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--txt2);transition:all .12s;white-space:nowrap;font-family:inherit}
.f-chip.on{background:var(--sky800);color:#fff;border-color:var(--sky800)}
.f-chip.c-teal.on{background:var(--teal600);border-color:var(--teal600)}
.f-chip.c-coral.on{background:var(--coral);border-color:var(--coral)}
.f-chip.c-amber.on{background:var(--amber);border-color:var(--amber)}
.search-box{flex:1;min-width:160px;padding:6px 10px;border-radius:var(--r8);border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--txt);background:var(--card);outline:none}
.search-box:focus{border-color:var(--sky100);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.filter-count{font-size:13px;color:var(--txt2);font-weight:600;white-space:nowrap;padding:4px 0}

/* ── TABLE ── */
.tbl-wrap{background:var(--card);border-radius:var(--r12);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg);border-bottom:2px solid var(--border)}
th{padding:9px 12px;font-size:12px;font-weight:700;color:var(--txt);text-align:left;white-space:nowrap}
td{padding:10px 12px;font-size:13px;color:var(--txt2);border-bottom:1px solid var(--border2);vertical-align:middle}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--sky50)}
tbody tr:last-child td{border-bottom:none}
.td-content{white-space:normal;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;color:var(--txt);line-height:1.55;word-break:keep-all}
.td-nowrap{white-space:nowrap}
.col-expand{width:100%;min-width:320px}
.col-remark{width:140px;min-width:140px;max-width:140px}
.col-date{width:80px;white-space:nowrap}
.col-tunnel{width:52px;white-space:nowrap}
.col-type{width:44px;white-space:nowrap}
.col-loc{width:80px;white-space:nowrap}
.col-status{width:64px;white-space:nowrap}
.col-date2{width:80px;white-space:nowrap}
.col-company{width:88px;white-space:nowrap}
.col-contact{width:76px;white-space:nowrap}
.col-manager{width:72px;white-space:nowrap}

/* ── STATUS BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-done{background:var(--teal50);color:var(--teal600)}
.badge-prog{background:var(--coral50);color:var(--coral)}
.badge-poor{background:var(--amber50);color:var(--amber)}

/* ── DASHBOARD ── */
.sc{background:var(--card);border-radius:var(--r12);border:1px solid var(--border);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.sc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sc-hd h3{font-size:13px;font-weight:700;color:var(--txt)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:13px;color:var(--txt2);min-width:64px;flex-shrink:0;font-weight:500}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .4s ease}
.bar-val{font-size:13px;font-weight:700;color:var(--txt);min-width:28px;text-align:right;flex-shrink:0}
.bar-sub{font-size:12px;font-weight:700;color:var(--teal600);min-width:36px;text-align:right;flex-shrink:0}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.status-card{padding:12px;border-radius:var(--r8);text-align:center}
.status-card .num{font-size:24px;font-weight:900;line-height:1}
.status-card .lbl{font-size:12px;margin-top:4px;font-weight:600}
.status-done{background:var(--teal50);color:var(--teal600)}
.status-prog{background:var(--coral50);color:var(--coral)}
.status-poor{background:var(--amber50);color:var(--amber)}

/* ── MODAL ── */
#cfgModal, #detailModal{
  visibility:hidden; opacity:0; pointer-events:none;
  transition:opacity .15s, visibility .15s;
}
#cfgModal.modal-open, #detailModal.modal-open{
  visibility:visible; opacity:1; pointer-events:auto;
}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:18px}
.modal-box{background:var(--card);border-radius:var(--r20);padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:7px;color:var(--txt)}
.modal-field{margin-bottom:14px}
.modal-label{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r8);padding:10px 12px;font-size:15px;font-family:inherit;color:var(--txt);outline:none;transition:border .18s}
.modal-input:focus{border-color:var(--sky);background:#fff}
.modal-hint{font-size:12px;color:var(--txt3);margin-top:4px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-save{background:var(--sky);border:none;color:#fff;border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:40px}
.modal-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--txt2);border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px}

/* ── DETAIL MODAL ── */
.detail-modal-box{max-width:560px;max-height:85vh;overflow-y:auto}
.detail-modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.detail-modal-hd h3{font-size:15px;font-weight:700;color:var(--txt)}
.detail-modal-close{width:28px;height:28px;border-radius:var(--r6);border:none;background:var(--bg);color:var(--txt2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border2)}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:13px;font-weight:700;color:var(--txt2);min-width:80px;flex-shrink:0;padding-top:1px}
.detail-val{font-size:13px;color:var(--txt);line-height:1.6;flex:1}

/* ── 사진 영역 ── */
.photo-section{padding:10px 0;border-bottom:1px solid var(--border2)}
.photo-section:last-child{border-bottom:none}
.photo-label{font-size:12px;font-weight:700;color:var(--txt3);margin-bottom:6px}
.photo-wrap{position:relative;background:var(--bg);border-radius:var(--r8);overflow:hidden;border:1px solid var(--border)}
.photo-wrap a{display:block}
.photo-img{width:100%;max-height:280px;object-fit:contain;display:block;cursor:zoom-in;transition:opacity .25s}
.photo-img.loading{opacity:0}
.photo-img.loaded{opacity:1}
.photo-err{display:none;padding:20px;text-align:center;font-size:12px;color:var(--txt3);line-height:1.8}
.photo-err a{color:var(--sky600);font-weight:700;text-decoration:none}
.photo-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.photo-spinner::after{content:'';width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--sky600);border-radius:50%;animation:spin .7s linear infinite}

/* ── EMPTY / STATUS ── */
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty p{font-size:13px}
.last-update{font-size:11px;color:rgba(255,255,255,.75);min-height:14px;text-align:right}

/* ── RESPONSIVE ── */

/* 모바일 공통 (~ 640px) */
@media(max-width:640px){
  /* 헤더 */
  .hdr{padding:9px 12px;min-height:unset}
  .hdr-title{font-size:14px;white-space:nowrap}
  .hdr-sub{font-size:10px}
  .hdr-icon{width:30px;height:30px;flex-shrink:0}
  .hdr-icon svg{width:16px;height:16px}
  .hdr-right{flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
  .hdr-btns{gap:5px}
  .hdr-btn{padding:4px 9px;font-size:11px;min-height:26px;gap:3px}
  .hdr-btn svg{width:11px;height:11px}
  .last-update{font-size:10px}

  /* 탭 - 균등 분할 */
  .tab-btn{font-size:13px;padding:11px 2px;letter-spacing:-.02em}

  /* KPI */
  .kpi-bar{padding:8px 10px;gap:6px}
  .kpi-card{min-width:56px;padding:6px 6px}
  .kpi-num{font-size:18px}
  .kpi-lbl{font-size:11px}

  /* 본문 */
  .wrap{padding:10px}

  /* 대시보드 */
  .dash-grid{grid-template-columns:1fr}
  .status-grid{grid-template-columns:repeat(3,1fr)}
  .sc{padding:12px}
  .sc-hd{flex-wrap:wrap;gap:6px}

  /* 테이블 - 모바일에서 담당자·전화번호 숨김 */
  .col-contact{display:none}
  .col-remark{display:none}
  table{min-width:480px}
  td{padding:7px 8px;font-size:12px}
  th{padding:7px 8px;font-size:11px}
  .td-content{-webkit-line-clamp:4}

  /* 필터 */
  .f-chip{font-size:11px;padding:4px 8px}
  .search-box{font-size:12px}

  /* 모달 */
  .modal-box{padding:18px;border-radius:var(--r16)}
  .detail-modal-box{max-height:90vh}
}

/* 소형 모바일 (~ 380px) */
@media(max-width:380px){
  .tab-btn{font-size:12px}
  .hdr-title{font-size:14px}
  .kpi-num{font-size:16px}
}

/* 태블릿 (641px ~ 960px) */
@media(min-width:641px) and (max-width:960px){
  .tab-btn{font-size:12px;padding:11px 6px}
  .wrap{padding:14px}
  .col-contact{display:table-cell}
  .col-remark{display:table-cell}
}

/* PC (961px ~) */
@media(min-width:961px){
  .tab-btn{font-size:13px;padding:11px 16px}
  .wrap{padding:18px}
  .col-contact{display:table-cell}
  .col-remark{display:table-cell}
  table{width:100%;min-width:1100px}
  .hdr-right{flex-direction:column;align-items:flex-end;gap:4px}
  .hdr-btn{padding:5px 13px;font-size:13px;min-height:32px}
  .last-update{font-size:11px}
}

@media(max-width:640px){
  .modal-backdrop{padding:0;align-items:flex-end}
  .detail-modal-box{max-width:100%;width:100%;border-radius:var(--r20) var(--r20) 0 0;max-height:92vh}
  .modal-box{border-radius:var(--r16) var(--r16) 0 0;max-width:100%}
}

/* ── TUNNEL DROPDOWN ── */
.dd-wrap{position:relative;display:inline-block}
.dd-btn{background:var(--sky50);border:1.5px solid var(--sky100);color:var(--sky800);border-radius:20px;padding:5px 28px 5px 10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;min-height:30px;white-space:nowrap;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;user-select:none;position:relative;transition:border-color .15s}
.dd-btn:hover{border-color:var(--sky)}
.dd-btn::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--sky600)}
.dd-btn.active{background:var(--sky800);color:#fff;border-color:var(--sky800)}
.dd-btn.active::after{color:#fff}
.dd-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r12);box-shadow:0 8px 24px rgba(55,138,221,.15);z-index:500;min-width:130px;display:none;overflow:hidden}
.dd-menu.open{display:block}
.dd-opt{padding:9px 14px;font-size:13px;font-weight:600;color:var(--txt2);cursor:pointer;-webkit-tap-highlight-color:transparent;border-bottom:1px solid var(--border2);white-space:nowrap}
.dd-opt:last-child{border-bottom:none}
.dd-opt:hover{background:var(--sky50)}
.dd-opt.sel{background:var(--sky800);color:#fff;font-weight:700}

</style>
</head>
<body>

<!-- 설정 모달 -->
<div id="cfgModal">
  <div class="modal-backdrop" onclick="closeCfgModal(event)">
    <div class="modal-box" style="max-width:480px" onclick="event.stopPropagation()">
      <div class="modal-title">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        연동 설정
      </div>
      <div class="modal-field">
        <label class="modal-label">Cloudflare Worker URL</label>
        <input id="cfgWorkerUrl" class="modal-input" type="text" placeholder="https://your-worker.workers.dev"/>
        <div class="modal-hint">저장된 값은 XX로 마스킹 표시 · 변경 시에만 새로 입력하세요</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">노션 DB ID</label>
        <input id="cfgDbId" class="modal-input" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
        <div class="modal-hint">저장된 값은 XX로 마스킹 표시 · 변경 시에만 새로 입력하세요</div>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeCfgModal()">취소</button>
        <button class="modal-save" onclick="saveCfg()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div id="detailModal">
  <div class="modal-backdrop" onclick="closeDetail(event)">
    <div class="modal-box detail-modal-box" onclick="event.stopPropagation()">
      <div class="detail-modal-hd">
        <h3 id="detailTitle">하자 상세</h3>
        <button class="detail-modal-close" onclick="closeDetail()" aria-label="닫기">✕</button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>
</div>

<!-- 헤더 -->
<div class="hdr-wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <div>
        <div class="hdr-title">하자보수현황</div>
        <div class="hdr-sub">Notion DB 연동</div>
      </div>
    </div>
    <div class="hdr-right">

// ── 마스킹 헬퍼 ──
function maskVal(v){
  if(!v) return '';
  if(v.startsWith('http')){
    try{
      var u=new URL(v);
      var h=u.hostname;
      var parts=h.split('.');
      var masked=parts[0].length>4
        ? parts[0].slice(0,2)+'XX'+parts[0].slice(-2)+'.'+parts.slice(1).join('.')
        : 'XX.'+parts.slice(1).join('.');
      return u.protocol+'//'+masked;
    }catch(e){ return v.slice(0,6)+'XX...XX'+v.slice(-4); }
  }
  if(/^[0-9a-f\-]{32,36}$/i.test(v)){
    var clean=v.replace(/-/g,'');
    return clean.slice(0,4)+'-XXXX-XXXX-XXXX-'+clean.slice(-4);
  }
  return v.slice(0,3)+'XX...XX'+v.slice(-3);
}

/* ── NOTION FETCH HELPER ── */
function fetchNotion(workerUrl, dbId, body){
  return fetch(workerUrl+'/v1/databases/'+dbId+'/query',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  });
}

/* ── parseNotionPage ── */

function getPropText(p){
  if(!p) return '';
  if(p.type==='title')        return (p.title||[]).map(function(t){return t.plain_text||'';}).join('');
  if(p.type==='rich_text')    return (p.rich_text||[]).map(function(t){return t.plain_text||'';}).join('');
  if(p.type==='select')       return (p.select&&p.select.name)||'';
  if(p.type==='multi_select') return (p.multi_select||[]).map(function(s){return s.name;}).join(', ');
  if(p.type==='number')       return p.number!==null&&p.number!==undefined ? String(p.number) : '';
  if(p.type==='formula')      return String(p.formula&&(p.formula.string||p.formula.number)||'');
  if(p.type==='url')          return p.url||'';
  if(p.type==='date')         return (p.date&&p.date.start)||'';
  if(p.type==='checkbox')     return p.checkbox ? '완료' : '진행중';
  if(p.type==='phone_number') return p.phone_number||'';
  if(p.type==='email')        return p.email||'';
  return '';
}

function parseNotionPage(page, idx){
  var props = page.properties||{};
  var result = { _idx: idx+1, _pageId: page.id };

  // NOTION_PROP_MAP이 있으면 직접 접근, 없으면 키워드 검색 폴백
  function getField(internalKey, kwFallback){
    var notionKey = NOTION_PROP_MAP[internalKey];
    if(notionKey && props[notionKey]) return getPropText(props[notionKey]);
    // 폴백: 키워드 검색
    var entries=Object.entries(props);
    for(var ki=0; ki<kwFallback.length; ki++){
      var kw=kwFallback[ki].toLowerCase();
      for(var ei=0; ei<entries.length; ei++){
        if(entries[ei][0].toLowerCase().includes(kw)){
          var v=getPropText(entries[ei][1]);
          if(v) return v;
        }
      }
    }
    return '';
  }

  // 날짜: date 타입 우선
  var dateVal='';
  var notionDateKey = NOTION_PROP_MAP['날짜'];
  if(notionDateKey && props[notionDateKey] && props[notionDateKey].type==='date'){
    dateVal = (props[notionDateKey].date&&props[notionDateKey].date.start||'').slice(0,10);
  }
  if(!dateVal){
    var entries=Object.entries(props);
    for(var i=0; i<entries.length; i++){
      var p=entries[i][1];
      if(p.type==='date'&&p.date&&p.date.start){ dateVal=p.date.start.slice(0,10); break; }
    }
  }
  if(!dateVal){
    var _t=new Date();
    dateVal=_t.getFullYear()+'-'+fmt(_t.getMonth()+1)+'-'+fmt(_t.getDate());
  }
  result['날짜'] = dateVal.slice(0,10);

  result['터널명']     = getField('터널명',    ['터널명','터널','tunnel']);
  result['공종']       = getField('공종',       ['공종','type','공사종류']);
  result['위치']       = getField('위치',       ['위치','location','loc']);
  result['하자내용']   = getField('하자내용',   ['하자내용','내용','content']);
  result['조치여부']   = getField('조치여부',   ['조치여부','상태','status'])||'진행중';
  result['조치일']     = getField('조치일',     ['조치일','완료일','act_date']);
  result['업체명']     = getField('업체명',     ['업체명','업체','company']);
  result['업무담당']   = getField('업무담당',   ['관리','업무담당','manager']);
  result['업체담당자'] = getField('업체담당자', ['업체담당자','업체담당','contact']);
  result['전화번호']   = getField('전화번호',   ['전화번호','phone','연락처']);
  result['비고']       = getField('비고',       ['비고','remark','memo','메모']);

  // 사진: file 타입 → 첫 번째 파일 URL 추출
  function getFileUrl(internalKey, kwFallback){
    var notionKey=NOTION_PROP_MAP[internalKey];
    var p = notionKey&&props[notionKey] ? props[notionKey] : null;
    if(!p){
      var entries2=Object.entries(props);
      for(var ki2=0; ki2<kwFallback.length; ki2++){
        var kw2=kwFallback[ki2].toLowerCase();
        for(var ei2=0; ei2<entries2.length; ei2++){
          if(entries2[ei2][0].toLowerCase().includes(kw2)){ p=entries2[ei2][1]; break; }
        }
        if(p) break;
      }
    }
    if(!p) return '';
    if(p.type==='files'&&p.files&&p.files.length){
      var f=p.files[0];
      return (f.type==='external'?f.external&&f.external.url:f.file&&f.file.url)||'';
    }
    if(p.type==='url') return p.url||'';
    return getPropText(p);
  }
  result['하자사진_URL'] = getFileUrl('하자사진_URL', ['하자사진','photo1','사진1']);
  result['조치사진_URL'] = getFileUrl('조치사진_URL', ['조치사진','photo2','사진2']);

  // title 타입 폴백
  if(!result['하자내용']){
    var ents=Object.entries(props);
    for(var j=0; j<ents.length; j++){
      if(ents[j][1].type==='title'){
        var tv=getPropText(ents[j][1]);
        if(tv){ result['하자내용']=tv; break; }
      }
    }
  }

  // _extra_ 컬럼 값 추출 — Notion 연동 모드 전용
  // (buildNotionPropMap에서 미매핑 속성을 COL_DEFS에 동적 등록 후 여기서 값을 가져옴)
  // 데모 모드(loadDemo)에서는 parseNotionPage 자체를 호출하지 않으므로 이 블록은 실행되지 않음
  COL_DEFS.forEach(function(c){
    if(c.key.indexOf('_extra_')===0){
      var nk=NOTION_PROP_MAP[c.key];
      if(nk&&props[nk]) result[c.key]=getPropText(props[nk]);
    }
  });

  return result;
}

/* ── LOAD DATA (Notion) ── */
function loadData(){
  if(!CFG.workerUrl||!CFG.dbId){ openCfgModal(); return; }
  setSync(true);
  var lu = document.getElementById('lastUpdate');
  if(lu){ lu.textContent=''; }

  // probe: 1건 조회로 실제 속성명 자동 감지 → NOTION_PROP_MAP 갱신
  fetchNotion(CFG.workerUrl, CFG.dbId, {page_size:1})
    .then(function(probe){
      var pages = probe.results||[];
      if(pages.length){ buildNotionPropMap(pages[0].properties||{}); }

      // 전체 데이터 조회
      var sortProp = (NOTION_PROP_MAP['날짜']||'날짜');
      var body = { page_size:100, sorts:[{property:sortProp, direction:'descending'}] };

      return fetchNotion(CFG.workerUrl, CFG.dbId, body)
        .then(function(data){
          var allPages = data.results||[];
          var cursor = data.next_cursor, hasMore = data.has_more, pageCount = 0;
          var truncated = false; // MAX_PAGES 초과로 잘렸는지 여부
          function fetchNext(cur, more){
            if(!cur||!more) return Promise.resolve();
            if(pageCount++>=MAX_PAGES){ truncated=true; return Promise.resolve(); }
            return fetchNotion(CFG.workerUrl, CFG.dbId, Object.assign({},body,{start_cursor:cur}))
              .then(function(d2){
                allPages = allPages.concat(d2.results||[]);
                return fetchNext(d2.next_cursor, d2.has_more);
              });
          }
          return fetchNext(cursor, hasMore).then(function(){
            ALL_DATA = allPages.map(parseNotionPage).filter(function(r){ return r['하자내용']&&r['하자내용'].length>0; });
            buildTunnelFilter();
            buildManagerFilter();
            buildTabDropdowns();
            updateKPI();
            renderAll();
            rebuildListHeader();
            setSync(false);
            var kpiBar=document.getElementById('kpiBar');
            if(kpiBar) kpiBar.style.display = CURRENT_TAB===0?'none':'';
            var now=new Date();
            var upTxt='마지막 업데이트: '+fmt(now.getMonth()+1)+'. '+fmt(now.getDate())+'. '+fmt(now.getHours())+':'+fmt(now.getMinutes());
            if(truncated) upTxt += ' ⚠ 데이터가 '+MAX_PAGES*100+'건을 초과하여 일부만 표시됩니다';
            if(lu){
              lu.textContent=upTxt;
              lu.style.color = truncated ? 'rgba(255,200,100,.95)' : 'rgba(255,255,255,.75)';
            }
          });
        });
    })
    .catch(function(e){
      setSync(false);
      var msg='⚠ '+e.message;
      if(e.message.indexOf('400')>=0)       msg='⚠ HTTP 400 — Worker URL 또는 DB ID를 확인하세요';
      else if(e.message.indexOf('401')>=0||e.message.indexOf('403')>=0) msg='⚠ 인증 오류 — Notion API 키를 확인하세요';
      else if(e.message.indexOf('404')>=0)  msg='⚠ DB를 찾을 수 없습니다 — DB ID를 확인하세요';
      else if(e.message.indexOf('fetch')>=0||e.message.indexOf('network')>=0) msg='⚠ 네트워크 오류 — Worker URL을 확인하세요';
      if(lu){ lu.textContent=msg; lu.style.color='rgba(255,150,130,.9)'; }
      console.error(e);
    });
}

/* ── probe: 실제 노션 속성명 → 내부 key 매핑 ── */
function buildNotionPropMap(props){
  NOTION_PROP_MAP = {};
  var keys = Object.keys(props);

  // 내부 key별 키워드와 타입 힌트로 매칭
  var matchers = [
    { key:'날짜',        kws:['날짜','date'],            types:['date','created_time'] },
    { key:'터널명',      kws:['터널명','터널','tunnel'],  types:['select','multi_select','title','rich_text'] },
    { key:'공종',        kws:['공종','type','공사'],      types:['select','multi_select','rich_text'] },
    { key:'위치',        kws:['위치','location','loc'],  types:['rich_text','text','title'] },
    { key:'업무담당',    kws:['관리','업무담당','manager'],    types:['select','rich_text','title'] },
    { key:'업체담당자',  kws:['업체담당자','업체담당','contact'], types:['rich_text','text','title'] },
    { key:'하자내용',    kws:['하자내용','내용','content','하자'], types:['title','rich_text'] },
    { key:'조치여부',    kws:['조치여부','상태','status'], types:['select','checkbox'] },
    { key:'조치일',      kws:['조치일','완료일','act'],   types:['date'] },
    { key:'하자사진_URL',kws:['하자사진','photo1','사진1','하자'], types:['files','url','rich_text'] },
    { key:'조치사진_URL',kws:['조치사진','photo2','사진2','조치사'], types:['files','url','rich_text'] },
    { key:'업체명',      kws:['업체명','업체','company'], types:['rich_text','title','text'] },
    { key:'전화번호',    kws:['전화번호','전화','phone','연락'], types:['phone_number','rich_text','text'] },
    { key:'비고',        kws:['비고','remark','memo','메모'], types:['rich_text','text'] }
  ];

  matchers.forEach(function(m){
    // 이미 다른 내부 key에 매핑된 notionKey는 재사용 안 함
    function alreadyUsed(nk){ return Object.values(NOTION_PROP_MAP).indexOf(nk)>=0; }
    // 1차: 키워드 + 타입 동시 매칭 (정확도 높음)
    for(var ki=0; ki<m.kws.length; ki++){
      var kw = m.kws[ki].toLowerCase();
      for(var ni=0; ni<keys.length; ni++){
        var nk = keys[ni];
        if(nk.toLowerCase().includes(kw) && m.types.indexOf(props[nk].type)>=0 && !alreadyUsed(nk)){
          if(!NOTION_PROP_MAP[m.key]){ NOTION_PROP_MAP[m.key]=nk; return; }
        }
      }
    }
    // 2차: 키워드만 매칭 (타입 무관)
    for(var ki2=0; ki2<m.kws.length; ki2++){
      var kw2=m.kws[ki2].toLowerCase();
      for(var ni2=0; ni2<keys.length; ni2++){
        var nk2=keys[ni2];
        if(nk2.toLowerCase().includes(kw2) && !alreadyUsed(nk2)){
          if(!NOTION_PROP_MAP[m.key]){ NOTION_PROP_MAP[m.key]=nk2; return; }
        }
      }
    }
  });
  // title 타입 → 하자내용 폴백
  if(!NOTION_PROP_MAP['하자내용']){
    for(var ti=0; ti<keys.length; ti++){
      if(props[keys[ti]].type==='title'){ NOTION_PROP_MAP['하자내용']=keys[ti]; break; }
    }
  }
  // COL_DEFS에 없는 노션 속성 추가 (새 컬럼 자동 감지)
  keys.forEach(function(nk){
    var alreadyMapped = Object.values(NOTION_PROP_MAP).indexOf(nk)>=0;
    if(!alreadyMapped){
      var tempKey = '_extra_'+nk;
      var alreadyInDefs = COL_DEFS.some(function(c){ return c.key===tempKey; });
      if(!alreadyInDefs){
        COL_DEFS.push({key:tempKey,label:nk,width:'col-remark',fixed:false});
        NOTION_PROP_MAP[tempKey]=nk;
      }
    }
  });
}

function fmt(n){ return n<10?'0'+n:String(n); }

/* ── COMMON HELPER ── */
function getUniqueValues(key){
  var seen={}, result=[];
  ALL_DATA.forEach(function(r){ var v=r[key]; if(v&&!seen[v]){seen[v]=1;result.push(v);} });
  return result.sort();
}

/* ── BUILD MANAGER DROPDOWN ── */
function buildManagerFilter(){
  var managers = getUniqueValues('업무담당');
  var menu = document.getElementById('managerDdMenu');
  if(!menu) return;
  var opts = [{ val:'ALL', label:'관리 전체' }];
  managers.forEach(function(m){ opts.push({ val:m, label:m }); });
  menu.innerHTML = opts.map(function(o){
    return '<div class="dd-opt'+(o.val==='ALL'?' sel':'')+'" data-val="'+o.val+'">'+o.label+'</div>';
  }).join('');
  if(!buildManagerFilter._bound){
    buildManagerFilter._bound = true;
    menu.addEventListener('click', function(e){
      var opt = e.target.closest ? e.target.closest('.dd-opt') : e.target;
      if(opt && opt.dataset && opt.dataset.val) selectManager(opt.dataset.val, opt);
    });
    document.addEventListener('click', function(e){
      var wrap = document.getElementById('managerDdWrap');
      if(wrap && !wrap.contains(e.target)) closeManagerDd();
    });
  }
}

/* ── 드롭다운 공통 toggle/close 헬퍼 ── */
function toggleDd(menuId, btnId){
  var menu = document.getElementById(menuId);
  var btn  = document.getElementById(btnId);
  if(!menu||!btn) return;
  if(menu.classList.contains('open')){ closeDd(menuId, btnId); }
  else { menu.classList.add('open'); btn.classList.add('active'); }
}
function closeDd(menuId, btnId){
  var menu = document.getElementById(menuId); if(menu) menu.classList.remove('open');
  var btn  = document.getElementById(btnId);  if(btn)  btn.classList.remove('active');
}

function toggleManagerDd(){ toggleDd('managerDdMenu','managerDdBtn'); }
function closeManagerDd()  { closeDd('managerDdMenu','managerDdBtn'); }

function selectManager(val, el){
  document.querySelectorAll('#managerDdMenu .dd-opt').forEach(function(o){ o.classList.remove('sel'); });

/* ── KPI ── */

function calcGroupKpi(groupKey){
  var d = ALL_DATA;
  var groups = groupBy(d, groupKey);
  var keys = Object.keys(groups);
  var rates = keys.map(function(k){
    var r=groups[k], dn=r.filter(function(x){return x['조치여부']==='완료';}).length;
    return Math.round(dn/r.length*100);
  });
  var avgRate = keys.length>0 ? Math.round(rates.reduce(function(a,b){return a+b;},0)/keys.length) : 0;
  var unproc  = d.filter(function(r){return r['조치여부']==='진행중'||r['조치여부']==='미흡';}).length;
  return { count:keys.length, unproc:unproc, avgRate:avgRate };
}

/* ── 상태별 카운트 공통 헬퍼 ── */
function countStatus(data){
  var done=0, prog=0, poor=0;
  data.forEach(function(r){
    var s=r['조치여부'];
    if(s==='완료') done++; else if(s==='진행중') prog++; else if(s==='미흡') poor++;
  });
  return {done:done, prog:prog, poor:poor};
}

function updateKPI(tabNum){
  if(tabNum === undefined) tabNum = CURRENT_TAB;
  var d = ALL_DATA;
  var c = countStatus(d);
  var done=c.done, prog=c.prog, poor=c.poor;

  // 요약 대시보드 카드는 항상 전체 기준
  document.getElementById('ds-done').textContent = done;
  document.getElementById('ds-prog').textContent = prog;
  document.getElementById('ds-poor').textContent = poor;
  var rate = d.length>0?Math.round(done/d.length*100):0;
  document.getElementById('rateWrap').innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
    +'<span style="font-size:32px;font-weight:900;color:var(--teal600)">'+rate+'%</span>'
    +'<span style="font-size:13px;font-weight:600;color:var(--txt2)">하자 완료율</span></div>'
    +'<div class="bar-track" style="height:12px">'
    +'<div class="bar-fill" style="width:'+rate+'%;background:var(--teal600)"></div></div>';

  if(tabNum === 0){
    setKpiLabels('전체','진행중','완료','미흡','poor');
    document.getElementById('kpiTotal').textContent = d.length;
    document.getElementById('kpiProg').textContent  = prog;
    document.getElementById('kpiDone').textContent  = done;
    document.getElementById('kpiPoor').textContent  = poor;
  } else if(tabNum === 1){
    updateKpiForList();
  } else if(tabNum === 2){
    // 미처리 탭 — kpiPoor(amber카드)에 미흡, kpiDone(초록카드)에 완료
    var unproc = prog + poor;
    setKpiLabels('미처리 전체','진행중','완료','미흡','poor');
    document.getElementById('kpiTotal').textContent = unproc;
    document.getElementById('kpiProg').textContent  = prog;
    document.getElementById('kpiDone').textContent  = done;
    document.getElementById('kpiPoor').textContent  = poor;
  } else if(tabNum === 3){
    var g2=calcGroupKpi('터널명');
    setKpiLabels('터널 수','미처리 합계','평균 완료율','미흡','poor');
    document.getElementById('kpiTotal').textContent = g2.count+'개';
    document.getElementById('kpiProg').textContent  = g2.unproc;
    document.getElementById('kpiDone').textContent  = g2.avgRate+'%';
    document.getElementById('kpiPoor').textContent  = poor;
  } else if(tabNum === 4){
    var g3=calcGroupKpi('공종');
    setKpiLabels('공종 수','미처리 합계','평균 완료율','미흡','poor');
    document.getElementById('kpiTotal').textContent = g3.count+'개';
    document.getElementById('kpiProg').textContent  = g3.unproc;
    document.getElementById('kpiDone').textContent  = g3.avgRate+'%';
    document.getElementById('kpiPoor').textContent  = poor;
  } else if(tabNum === 5){
    var g4=calcGroupKpi('업체명');
    setKpiLabels('업체 수','미처리 합계','평균 완료율','미흡','poor');
    document.getElementById('kpiTotal').textContent = g4.count+'개';
    document.getElementById('kpiProg').textContent  = g4.unproc;
    document.getElementById('kpiDone').textContent  = g4.avgRate+'%';
    document.getElementById('kpiPoor').textContent  = poor;
  }
}

/* ── LIST ── */
function renderList(){
  var rows = filtered();
  rows = rows.map(function(r){
    return { r:r, d:(r['날짜']||'').replace(/[.\/]/g,'-') };
  }).sort(function(a,b){
    return a.d < b.d ? -1 : a.d > b.d ? 1 : 0;
  }).map(function(o){ return o.r; });

  var visKeys = getVisibleCols();
  document.getElementById('filterCount').textContent = '총 '+rows.length+'건';
  var tbody = document.getElementById('listBody');
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="'+visKeys.length+'" style="text-align:center;padding:32px;color:var(--txt3)">검색 결과가 없습니다</td></tr>';
    if(CURRENT_TAB===1) updateKpiForList();
    return;
  }
  tbody.innerHTML = rows.map(function(r){
    var s = r['조치여부'];
    var badge = s==='완료'?'badge-done':s==='진행중'?'badge-prog':'badge-poor';
    var cells = visKeys.map(function(key){
      var def = getColDef(key);
      var cls = def ? def.width : '';
      var val = r[key]||'';
      if(key==='날짜')     return '<td class="td-nowrap">'+shortDate(val)+'</td>';
      if(key==='조치일')   return '<td class="td-nowrap">'+shortDate(val)+'</td>';
      if(key==='터널명')   return '<td class="td-nowrap"><strong>'+esc(val)+'</strong></td>';
      if(key==='조치여부') return '<td><span class="badge '+badge+'">'+esc(s||'-')+'</span></td>';
      if(key==='하자내용') return '<td><span class="td-content">'+esc(val)+'</span></td>';
      return '<td class="'+cls+' td-nowrap">'+esc(val||'-')+'</td>';
    }).join('');
    return '<tr onclick="openDetail('+r._idx+')">'+cells+'</tr>';
  }).join('');
  if(CURRENT_TAB===1) updateKpiForList();
}

function shortDate(d){
  if(!d) return '-';
  var m = d.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return d||'-';
}

/* ── BAR ROW 공통 헬퍼 ── */
// label: 표시명, count: 건수, max: 최대건수(비율 기준), color: 바 색상
// rate: 완료율(숫자, 없으면 null), unprocBadge: 미처리 뱃지 HTML(없으면 ''), labelStyle: 추가 style
function buildBarRow(label, count, max, color, rate, unprocBadge, labelStyle){
  var pct = Math.round(count / max * 100);
  var html = '<div class="bar-row">'
    +'<div class="bar-label"'+(labelStyle?' style="'+labelStyle+'"':'')+'>'+esc(label)+'</div>'
    +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
    +'<div class="bar-val">'+count+'</div>';
  if(rate !== null) html += '<div class="bar-sub" style="color:var(--teal600)">'+rate+'%</div>';
  if(unprocBadge) html += unprocBadge;
  html += '</div>';
  return html;
}

/* ── DASHBOARD CHARTS ── */
function renderDashboard(){
  // 단일 순회로 터널·공종·업체 그룹 동시 수집
  var tunnels={}, types={}, companies={};
  ALL_DATA.forEach(function(r){
    var tn=r['터널명']||'(미지정)', tp=r['공종']||'(미지정)', cp=r['업체명']||'(미지정)';
    if(!tunnels[tn])   tunnels[tn]=[];   tunnels[tn].push(r);
    if(!types[tp])     types[tp]=[];     types[tp].push(r);
    if(!companies[cp]) companies[cp]=[]; companies[cp].push(r);
  });

  // 터널별
  var tc = document.getElementById('tunnelChart');
  var tvals = Object.values(tunnels).map(function(a){return a.length;});
  var tmax = tvals.length ? Math.max.apply(null, tvals) : 1;
  tc.innerHTML = Object.keys(tunnels).sort().map(function(t){
    var rows = tunnels[t];
    var done = rows.filter(function(r){return r['조치여부']==='완료';}).length;
    var rate = Math.round(done/rows.length*100);
    return buildBarRow(t, rows.length, tmax, 'var(--sky600)', rate, '', '');
  }).join('');

  // 공종별
  var ec = document.getElementById('typeChart');
  var evals = Object.values(types).map(function(a){return a.length;});
  var emax = evals.length ? Math.max.apply(null, evals) : 1;
  var colors = ['var(--sky600)','var(--teal600)','var(--coral)','var(--amber)','var(--purple)','var(--green)'];
  var ci = 0;
  ec.innerHTML = Object.keys(types).sort(function(a,b){return types[b].length-types[a].length;}).map(function(t){
    var rows = types[t];
    var col  = colors[ci++ % colors.length];
    return buildBarRow(t, rows.length, emax, col, null, '', '');
  }).join('');

  // 업체별
  var cc = document.getElementById('companyChart');
  var csorted = Object.keys(companies).sort(function(a,b){return companies[b].length-companies[a].length;});
  var cmax = companies[csorted[0]] ? companies[csorted[0]].length : 1;
  var ci2 = 0;
  cc.innerHTML = csorted.map(function(cp){
    var rows = companies[cp];
    var done = rows.filter(function(r){return r['조치여부']==='완료';}).length;
    var prog = rows.filter(function(r){return r['조치여부']==='진행중';}).length;
    var poor = rows.filter(function(r){return r['조치여부']==='미흡';}).length;
    var rate = Math.round(done/rows.length*100);
    var col  = colors[ci2++ % colors.length];
    var unproc = prog + poor;
    var unprocBadge = unproc > 0
      ? '<span style="font-size:10px;font-weight:700;color:var(--coral);background:var(--coral50);border-radius:10px;padding:1px 6px;margin-left:4px">미처리 '+unproc+'</span>'
      : '';
    return buildBarRow(cp, rows.length, cmax, col, rate, unprocBadge, 'min-width:80px;max-width:80px;overflow:hidden;text-overflow:ellipsis');
  }).join('');
}

  var menuId = kind==='tunnel'?'tunnelTabDdMenu':kind==='type'?'typeTabDdMenu':'companyTabDdMenu';
  var btnId  = kind==='tunnel'?'tunnelTabDdBtn':kind==='type'?'typeTabDdBtn':'companyTabDdBtn';
  toggleDd(menuId, btnId);
}

function closeTabDd(menuId, btnId){ closeDd(menuId, btnId); }

function selectTabDd(kind, val, el){
  var menuId  = kind==='tunnel'?'tunnelTabDdMenu':kind==='type'?'typeTabDdMenu':'companyTabDdMenu';
  var btnId   = kind==='tunnel'?'tunnelTabDdBtn':kind==='type'?'typeTabDdBtn':'companyTabDdBtn';
  var labelId = kind==='tunnel'?'tunnelTabDdLabel':kind==='type'?'typeTabDdLabel':'companyTabDdLabel';
  var defLabel= kind==='tunnel'?'터널 전체':kind==='type'?'공종 전체':'업체 전체';
  document.querySelectorAll('#'+menuId+' .dd-opt').forEach(function(o){ o.classList.remove('sel'); });
  if(el) el.classList.add('sel');
  document.getElementById(labelId).textContent = val==='ALL' ? defLabel : val;
  var btn = document.getElementById(btnId);
  if(btn) btn.classList.toggle('active', val!=='ALL');
  TAB_FILTER[kind] = val;
  closeTabDd(menuId, btnId);
  if(kind==='tunnel'){ renderTunnelPanel(); }
  else if(kind==='type'){ renderTypePanel(); }
  else               { renderCompanyPanel(); }
  updateTabCounts();
}

function updateTabCounts(){
  var tc = document.getElementById('tunnelTabCount');
  var ec = document.getElementById('typeTabCount');
  var cc = document.getElementById('companyTabCount');
  if(tc){
    var tData = TAB_FILTER.tunnel==='ALL' ? ALL_DATA : ALL_DATA.filter(function(r){return r['터널명']===TAB_FILTER.tunnel;});
    tc.textContent = '총 '+tData.length+'건';
  }
  if(ec){
    var eData = TAB_FILTER.type==='ALL' ? ALL_DATA : ALL_DATA.filter(function(r){return r['공종']===TAB_FILTER.type;});
    ec.textContent = '총 '+eData.length+'건';
  }
  if(cc){
    var cData = TAB_FILTER.company==='ALL' ? ALL_DATA : ALL_DATA.filter(function(r){return r['업체명']===TAB_FILTER.company;});
    cc.textContent = '총 '+cData.length+'건';
  }
}

/* ── TUNNEL PANEL ── */
// buildPanelRows: 패널 tbody 행 공통 생성 헬퍼
// cols: 출력할 컬럼 배열 — 각 항목은 { key, cls, render(r, badge) } 형태
function buildPanelRows(rows, cols){
  return rows.map(function(r){
    var s=r['조치여부'];
    var badge=s==='완료'?'badge-done':s==='진행중'?'badge-prog':'badge-poor';
    var cells = cols.map(function(c){ return c.render(r, badge); }).join('');
    return '<tr onclick="openDetail('+r._idx+')" style="cursor:pointer">'+cells+'</tr>';
  }).join('');
}
// buildPanelCard: 패널 카드 공통 래퍼 (헤더 + 테이블)
function buildPanelCard(title, subHtml, rows, thead, tbody, showRate){
  var done=rows.filter(function(r){return r['조치여부']==='완료';}).length;
  var prog=rows.filter(function(r){return r['조치여부']==='진행중';}).length;
  var poor=rows.filter(function(r){return r['조치여부']==='미흡';}).length;
  var rate=Math.round(done/rows.length*100);
  return '<div class="sc" style="margin-bottom:14px">'
    +'<div class="sc-hd"><div>'
    +'<h3>'+esc(title)+'<span style="display:inline-block;width:16px"></span>'
    +'<span style="font-size:13px;font-weight:500;color:var(--txt2)">'+rows.length+'건</span></h3>'
    +(subHtml||'')+'</div>'
    +'<div style="display:flex;gap:8px;align-items:center">'
    +'<span class="badge badge-done">완료 '+done+'</span>'
    +'<span class="badge badge-prog">진행중 '+prog+'</span>'
    +(poor>0?'<span class="badge badge-poor">미흡 '+poor+'</span>':'')
    +(showRate?'<span style="font-size:12px;font-weight:700;color:var(--teal600)">'+rate+'%</span>':'')
    +'</div></div>'
    +'<div class="tbl-wrap"><div class="tbl-scroll">'
    +'<table><thead><tr>'+thead+'</tr></thead><tbody>'+tbody+'</tbody></table>'
    +'</div></div></div>';
}

function renderTunnelPanel(){
  var allTunnels = groupBy(ALL_DATA,'터널명');
  var el = document.getElementById('tunnelPanels');
  var keys = Object.keys(allTunnels).sort();
  if(TAB_FILTER.tunnel !== 'ALL'){
    keys = keys.filter(function(k){ return k === TAB_FILTER.tunnel; });
  }
  if(!keys.length){ el.innerHTML='<div class="empty"><p>표시할 데이터가 없습니다</p></div>'; return; }
  var cols = [
    {render:function(r,b){return '<td><span class="badge '+b+'">'+esc(r['조치여부']||'-')+'</span></td>';}},
    {render:function(r){return '<td class="td-nowrap">'+shortDate(r['날짜'])+'</td>';}},
    {render:function(r){return '<td class="td-nowrap">'+esc(r['공종'])+'</td>';}},
    {render:function(r){return '<td class="td-nowrap">'+esc(r['위치'])+'</td>';}},
    {render:function(r){return '<td><span class="td-content">'+esc(r['하자내용'])+'</span></td>';}},
    {render:function(r){return '<td class="td-nowrap">'+esc(r['업체명']||'-')+'</td>';}},
    {render:function(r){return '<td class="td-nowrap col-contact">'+esc(r['업체담당자']||'-')+'</td>';}},
    {render:function(r){return '<td class="td-nowrap col-contact">'+esc(r['전화번호']||'-')+'</td>';}},
    {render:function(r){return '<td class="td-nowrap col-remark">'+esc(r['비고']||'-')+'</td>';}},
    {render:function(r){return '<td class="td-nowrap col-manager">'+esc(r['업무담당']||'-')+'</td>';}}
  ];
  var thead = '<th class="col-status">상태</th><th>날짜</th><th>공종</th><th>위치</th><th class="col-expand">하자내용</th><th>업체</th><th class="col-contact">업체담당</th><th class="col-contact">전화번호</th><th class="col-remark">비고</th><th class="col-manager">관리</th>';
  el.innerHTML = keys.map(function(t){
    var rows = allTunnels[t];
    return buildPanelCard(t, '', rows, thead, buildPanelRows(rows, cols), true);
  }).join('');
}

/* ── COMPANY PANEL ── */

    {render:function(r){return '<td class="td-nowrap">'+esc(r['공종'])+'</td>';}},

}

/* ── PHOTO URL 변환 ── */

function makePhotoHtml(label, rawUrl){
  if(!rawUrl || !rawUrl.trim()) return '';
  var origUrl = rawUrl.trim();
  // 보안: https?:// 이외의 프로토콜(javascript: 등) 차단
  if(!/^https?:\/\//i.test(origUrl)) return '';

  var inner = '<div class="photo-wrap">'
    +'<a href="'+esc(origUrl)+'" target="_blank" rel="noopener">'
    +'<img class="photo-img loading" src="'+esc(origUrl)+'" alt="'+esc(label)+'"'
    +' onload="this.classList.remove(\'loading\');this.classList.add(\'loaded\');var s=this.parentNode.parentNode.querySelector(\'.photo-spinner\');if(s)s.remove()"'
    +' onerror="this.style.display=\'none\';var e=this.parentNode.parentNode.querySelector(\'.photo-err\');if(e)e.style.display=\'block\';var s=this.parentNode.parentNode.querySelector(\'.photo-spinner\');if(s)s.remove()"'
    +'></a>'
    +'<div class="photo-spinner"></div>'
    +'<div class="photo-err">이미지를 불러올 수 없습니다<br><a href="'+esc(origUrl)+'" target="_blank">링크로 직접 열기 →</a></div>'
    +'</div>';

  return '<div class="photo-section">'
    +'<div class="photo-label">'+esc(label)+'</div>'
    +inner
    +'</div>';
}

/* ── DETAIL MODAL ── */
function openDetail(idx){
  var r = ALL_DATA.find(function(d){ return d._idx===idx; });
  if(!r) return;
  var s = r['조치여부'];
  var badge = s==='완료'?'badge-done':s==='진행중'?'badge-prog':'badge-poor';
  document.getElementById('detailTitle').innerHTML = esc(r['터널명'])+' · '+esc(r['공종']);
  var rows = [
    ['날짜',   esc(r['날짜']||'-')],
    ['터널명', esc(r['터널명']||'-')],
    ['공종',   esc(r['공종']||'-')],
    ['위치',   esc(r['위치']||'-')],
    ['하자내용', esc(r['하자내용']||'-')],
    ['조치여부', '<span class="badge '+badge+'">'+esc(s||'-')+'</span>'],
    ['조치일',  esc(r['조치일']||'-')],
    ['업체명',  esc(r['업체명']||'-')],
    ['담당자',  esc(r['업체담당자']||'-')],
    ['전화번호', esc(r['전화번호']||'-')],
    ['비고',    esc(r['비고']||'-')],
    ['관리',    esc(r['업무담당']||'-')],
  ];
  var infoHtml = rows.map(function(rv){
    return '<div class="detail-row"><div class="detail-key">'+rv[0]+'</div><div class="detail-val">'+rv[1]+'</div></div>';
  }).join('');

  var photoHtml = '';
  var p1 = r['하자사진_URL']||'';
  var p2 = r['조치사진_URL']||'';
  if(p1) photoHtml += makePhotoHtml('하자사진', p1);
  if(p2) photoHtml += makePhotoHtml('조치사진', p2);

  document.getElementById('detailBody').innerHTML = infoHtml + photoHtml;
  document.getElementById('detailModal').classList.add('modal-open');
  document.body.style.overflow='hidden';
}
function closeDetail(e){
  if(e && e.type==='click' && !e.target.classList.contains('modal-backdrop')) return;
  document.getElementById('detailModal').classList.remove('modal-open');
  document.body.style.overflow='';
}

/* ── TAB ── */
function switchTab(n,el){
  CURRENT_TAB = n;
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.remove('on');
    b.setAttribute('aria-selected','false');
  });
  document.getElementById('p'+n).classList.add('on');
  el.classList.add('on');
  el.setAttribute('aria-selected','true');
  // 요약 탭(0)에서는 KPI 바 숨김 (처리 상태 현황 카드와 중복)
  var kpiBar = document.getElementById('kpiBar');
  if(kpiBar) kpiBar.style.display = n === 0 ? 'none' : '';
  updateKPI(n);
}

/* ── SYNC BUTTON ── */
function setSync(loading){
  var btn  = document.getElementById('syncBtn');
  var icon = document.getElementById('syncIcon');
  var lbl  = document.getElementById('syncLabel');
  if(loading){
    btn.disabled = true;
    if(icon) icon.classList.add('spinning');
    lbl.textContent = '로딩중...';
  } else {
    btn.disabled = false;
    if(icon) icon.classList.remove('spinning');
    lbl.textContent = '새로고침';
  }
}

/* ── HELPERS ── */
function groupBy(arr, key){
  var obj={};
  arr.forEach(function(r){ var k=r[key]||'(미지정)'; if(!obj[k]) obj[k]=[]; obj[k].push(r); });
  return obj;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
